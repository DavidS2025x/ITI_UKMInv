<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Icons\UKM_InvDB_Transparent_Alt.ico">
    <title>Pregled Oseb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="CSS\style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="JS/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
<div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="confirmModalLabel">Izbris</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="confirmModalBody modal-body">
            </div>

            <div class="modal-footer">
                <div id="modalID" class="visually-hidden"></div>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-danger" onclick="izbrisiVnos(document.getElementById('modalID').textContent, actionUrl); bootstrap.Modal.getOrCreateInstance('#confirmModal').hide()">Izbriši</button>
            </div>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="container-fluid d-flex align-items-start ps-0 app-page">

    <!-- LEFT: buttons -->
    <div class="d-flex flex-column ps-2 pe-2 pt-4 me-5 app-sidebar">
        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/sluzbaPodatki', 'Službe')">
        Službe
        </button>

        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/enotaPodatki', 'Enote')">
        Enote
        </button>

        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/proizvajalecPodatki', 'Proizvajalci')">
        Proizvajalci
        </button>

        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/lokacijaPodatki', 'Lokacije')">
        Lokacije
        </button>

        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/osPodatki', 'Operacijski sistemi')">
        OS
        </button>

        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/tipiNapravPodatki', 'Tipi naprav')">
        Tipi naprav
        </button>

        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/tipiTiskalnikovPodatki', 'Tipi tiskalnikov')">
        Tipi tiskalnikov
        </button>

        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/tipiKategorijeNapravPodatki', 'Kategorije tipov naprav')">
        Kategorije tipov naprav
        </button>

        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/dovoljenjaPodatki', 'Dovoljenja')">
        Dovoljenja
        </button>
        
        <button class="btn app-sidebar-btn mb-2"
        onclick="tabela('/vlogePodatki', 'Vloge')">
        Vloge
        </button>

    </div>

    <!-- RIGHT: remaining space -->
    <div class="d-flex flex-column justify-content-start mt-5 app-content">
        <div class="me-5 d-flex justify-content-between align-items-end table-header-row">
            <div class="table-title">
                <h2 id="naslovTabele">
                <i id="naslovTabeleIcon" class="bi bi-pc-display"></i>
                <span id="naslovTabeleText">Službe</span>
                </h2>
            </div>
            <div id="tableControls" class="table-controls-box">
                <div id="searchContainer">
                    <input type="text" id="tableSearch" placeholder="Išči...">
                    <button type="button" class="btn btn-outline-danger ms-2" style="width: 30px; height: 30px; padding: 0; display: flex; align-items: center; justify-content: center; line-height: 1;" title="Počisti iskanje" onclick="document.getElementById('tableSearch').value = ''; $('#datatbl').DataTable().search('').draw();"><i class="bi bi-x-circle"></i></button>
                </div>
                <div id="pagLimitContainer">
                    <span>Prikaži:</span>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" id="25" name="pagLimit" value="25" checked>
                        <label class="form-check-label" for="25">25</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" id="50" name="pagLimit" value="50">
                        <label class="form-check-label" for="50">50</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" id="100" name="pagLimit" value="100">
                        <label class="form-check-label" for="100">100</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" id="200" name="pagLimit" value="200">
                        <label class="form-check-label" for="200">200</label>
                    </div>
                </div>
            </div>
        </div>
        <div id="table-responsive" class="me-5">
            <table id="datatbl" class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
        <div id="paginationContainer" class="me-5"></div>
    </div>

    </div>
</body>

<script src="JS/pregledSifrantov.js"></script>
