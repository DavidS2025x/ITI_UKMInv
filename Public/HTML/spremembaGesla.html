<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Icons\UKM_InvDB_Transparent_Alt.ico">
    <title>Sprememba gesla</title>
    <script src="JS/main.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="CSS\style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <!-- NAVIGATION -->
    <div class="container-fluid d-flex align-items-start justify-content-center app-page">
        <div class="d-flex flex-column justify-content-start app-content">
            <!-- FORM -->
            <div class="card form-card">
                <form id="changePasswordForm">
                    <div class="form-title-row">
                        <h1 class="form-title" id="naslov"><i class="bi bi-key"></i>Sprememba gesla</h1>
                    </div>
                    <hr class="mb-3">
                    <div class="mb-3 form-row">
                        <label for="stareGeslo" class="form-label me-2 form-label-col">Staro geslo</label>
                        <input type="password" id="stareGeslo" class="form-control" name="stareGeslo" required>
                    </div>
                    <div class="mb-3 form-row">
                        <label for="novoGeslo" class="form-label me-2 form-label-col">Novo geslo</label>
                        <input type="password" id="novoGeslo" class="form-control" name="novoGeslo" required>
                    </div>
                    <div id="passwordRequirements"></div>
                    <div class="mb-3 form-row">
                        <label for="potrdiGeslo" class="form-label me-2 form-label-col">Potrdi geslo</label>
                        <input type="password" id="potrdiGeslo" class="form-control" name="potrdiGeslo" required>
                    </div>
                    <hr class="mb-3">
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary me-2">Potrdi</button>
                        <button type="reset" class="btn btn-danger me-2">Ponastavi</button>
                        <button type="button" class="btn btn-secondary" onclick="window.history.back()"><i class="bi bi-arrow-left"></i> Prekliči</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="JS/spremembaGesla.js"></script>
</html>
