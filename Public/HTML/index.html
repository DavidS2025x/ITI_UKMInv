<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Icons\UKM_InvDB_Transparent_Alt.ico">
    <title>Nadzorna plošča</title>
    <script src="JS/main.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="CSS\style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>
    <!-- NAVIGATION -->

        <main class="container-fluid dashboard-page">
        <div class="row g-3 pb-3">
            <div class="col-12 col-xl-3">
                <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <div class="card h-100">
                                    <div class="card-header fw-semibold">Naprave po tipu</div>
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-pc-display"></i><span>Delovne postaje</span></div>
                                            <strong id="kpiDP">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-display"></i><span>Monitorji</span></div>
                                            <strong id="kpiMonitorji">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-printer"></i><span>Tiskalniki</span></div>
                                            <strong id="kpiTiskalniki">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-upc-scan"></i><span>Ročni čitalci</span></div>
                                            <strong id="kpiCitalci">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-hdd-network"></i><span>Virtualni strežniki</span></div>
                                            <strong id="kpiVM">-</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <div class="card h-100">
                                    <div class="card-header fw-semibold">Nerazporejene naprave</div>
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-pc-display"></i><span>Delovne postaje</span></div>
                                            <strong id="nerazDP">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-display"></i><span>Monitorji</span></div>
                                            <strong id="nerazMonitorji">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-printer"></i><span>Tiskalniki</span></div>
                                            <strong id="nerazTiskalniki">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-upc-scan"></i><span>Ročni čitalci</span></div>
                                            <strong id="nerazCitalci">-</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="card h-100">
                                    <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
                                        <span>Starejše od</span>
                                        <div class="d-flex align-items-center gap-2">
                                            <input type="number" id="starostInput" class="form-control age-input" value="0" min="0" max="50">
                                            <span>let</span>
                                        </div>
                                    </div>
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-pc-display"></i><span>Delovne postaje</span></div>
                                            <strong id="staroDP">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-display"></i><span>Monitorji</span></div>
                                            <strong id="staroMonitorji">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-printer"></i><span>Tiskalniki</span></div>
                                            <strong id="staroTiskalniki">-</strong>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center py-2">
                                            <div class="d-flex align-items-center gap-2"><i class="bi bi-upc-scan"></i><span>Ročni čitalci</span></div>
                                            <strong id="staroCitalci">-</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>
                </div>
            </div>

            <div class="col-12 col-xl-9">
                <div class="card h-100">
                    <div class="card-header fw-semibold">
                        <ul class="nav nav-tabs card-header-tabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="tab-leto" data-bs-toggle="tab" data-bs-target="#content-leto" type="button" role="tab" aria-controls="content-leto" aria-selected="true">Po letih</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="tab-enota" data-bs-toggle="tab" data-bs-target="#content-enota" type="button" role="tab" aria-controls="content-enota" aria-selected="false">Po enoti</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="tab-sluzba" data-bs-toggle="tab" data-bs-target="#content-sluzba" type="button" role="tab" aria-controls="content-sluzba" aria-selected="false">Po službi</button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body">
                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="content-leto" role="tabpanel" aria-labelledby="tab-leto">
                                <div class="chart-container">
                                    <canvas id="nakupiPoLetihGraf"></canvas>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="content-enota" role="tabpanel" aria-labelledby="tab-enota">
                                <div class="chart-container">
                                    <canvas id="napraviPosluzbiGraf"></canvas>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="content-sluzba" role="tabpanel" aria-labelledby="tab-sluzba">
                                <div class="chart-container">
                                    <canvas id="napravePoSluzbahGraf"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
<script src="JS/index.js"></script>
</html>
